changelog:
  categories:
    - title: "🚀 Features"
      labels: [enhancement]
    - title: "🐛 Bug Fixes"
      labels: [bug]
    - title: "📖 Documentation"
      labels: [documentation]
    - title: "🔧 Maintenance"
      labels: [chore, dependencies]
    - title: "🔒 Security"
      labels: [security]
  exclude:
    labels: [skip-changelog]
