name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/jostack-mdparse
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Inject version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml

      - name: Build
        run: uv build

      - name: Verify build
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes

      - name: Trigger langchain sync
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.LANGCHAIN_SYNC_TOKEN }}
          repository: hyunhee-jo/langchain-jostack-mdparse
          event-type: upstream-release
          client-payload: '{"version": "${{ steps.version.outputs.value }}"}'
